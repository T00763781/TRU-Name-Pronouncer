<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TRU Pronounce — Embed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <style>
    body{padding:0;margin:0}
    .topbar, .hero, .footer-note{display:none}
    .container{width:100%;max-width:none;margin:0;padding:0}
    .tool-section{padding:0}
    .tool-card{border-radius:0;box-shadow:none}
  </style>
</head>
<body>
  <main class="container">
    <section class="tool-section" id="tool">
      <div class="tool-grid" style="grid-template-columns: 1fr;">
        <div class="tool-card">
          <div class="tool-head">
            <h2 style="margin-bottom:6px">Share your name</h2>
            <p class="sub">Starting point only — adjust to match the person’s preference.</p>
          </div>
          <label class="sr-only" for="nameInput">Name</label>
          <input id="nameInput" class="name-input" type="text" placeholder="Add your name" autocomplete="off" spellcheck="false" />
          <div class="row">
            <div id="syllableEditor" class="chips" aria-label="Syllable chips"></div>
            <button id="addSyllableBtn" class="add-btn" type="button" aria-label="Add syllable">+</button>
          </div>
          <div class="hint-wrap">
            <label class="hint-label" for="hintInput">How to say it (in your words)</label>
            <input id="hintInput" class="hint-input" type="text" placeholder="Optional — edit to match preference" />
            <div class="helper" id="helper">
              <div class="helper-line" id="helperOne"></div>
              <div class="helper-line" id="helperCues"></div>
              <div class="helper-line helper-muted" id="helperScript"></div>
            </div>
          </div>
          <div class="actions">
            <button class="btn ghost" id="copyTextBtn" type="button">⧉ Copy text</button>
            <button class="btn ghost" id="copyHtmlBtn" type="button">&lt;/&gt; Copy HTML</button>
            <button class="btn" id="downloadBtn" type="button">Download card</button>
            <button class="btn danger" id="resetBtn" type="button">Reset</button>
          </div>
          <p class="subnote">Runs in your browser — nothing is uploaded.</p>
        </div>
      </div>
      <div class="preview-wrap" aria-label="Preview">
        <div class="preview-card" id="previewCard">
          <div class="preview-name" id="cardName"></div>
          <div class="preview-chips" id="cardSyllables"></div>
          <div class="preview-hint" id="cardHint"></div>
          <div class="preview-foot">How to say my name</div>
        </div>
      </div>
      <div class="toast hidden" id="toast" role="status" aria-live="polite"></div>
    </section>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
