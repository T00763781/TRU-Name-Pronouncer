<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRU Pronounce — Name Breakdown</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="editor" aria-label="Name editor">
      <div class="editor-card">
        <label class="sr-only" for="nameInput">Add your name</label>
        <input id="nameInput" class="name-input" type="text" placeholder="Add your name" autocomplete="off" spellcheck="false" />

        <div class="row">
          <div id="syllableEditor" class="chips" aria-label="Syllable chips"></div>
          <button id="addSyllableBtn" class="add-btn" type="button" aria-label="Add syllable">+</button>
        </div>

        <label class="sr-only" for="hintInput">Plain language guidance</label>
        <input id="hintInput" class="hint-input" type="text" placeholder='Add plain language guidance (e.g., Like "David" with a “K” instead of “D”)' />
      </div>
    </section>

    <section class="preview" aria-label="Pronunciation card preview">
      <div class="preview-card" id="previewCard">
        <div class="preview-name" id="cardName"> </div>
        <div class="preview-chips" id="cardSyllables"></div>
        <div class="preview-hint" id="cardHint"></div>
      </div>

      <div class="save-shell">
        <button class="save-btn" id="saveBtn" type="button">Save</button>
      </div>

      <p class="subnote" id="saveNote">Saving downloads a shareable HTML card.</p>
    </section>

    <div class="toast hidden" id="toast" role="status" aria-live="polite"></div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
